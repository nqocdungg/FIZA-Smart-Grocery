name: Keep Render Awake

on:
  schedule:
    # Chạy mỗi 14 phút một lần
    - cron: "*/14 * * * *"
  workflow_dispatch: # Cho phép chạy thủ công

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render API
        run: curl -s https://fiza-smart-grocery.onrender.com > /dev/null
